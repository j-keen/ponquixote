# 폰키호테 방학점 — 콘텐츠 제작 패키지 (10분 확장판)

> [!note] 작업 노트
> 읽기용 초안. 쭉 읽고 "여기 이렇게 고쳐" 하면 이 문서에서 바로 수정함.
> 각 대본은 목표 ~10분(실제 발화 기준). 타임코드는 가이드라인이라 촬영하며 조정 가능.

> [!warning] 공통 주의
> 대본 속 가격·지원금 숫자는 전부 **예시 플레이스홀더**. 촬영 전 실제 시세로 교체.
> "불법 보조금" 같은 표현은 직접 쓰지 않고 "지원금/조건/실구매가" 프레임으로 통일(단통법 리스크 회피).

# PART 1. 화이트보드 단독컷 기획 & 이미지 생성 프롬프트

이번 버전은 **화이트보드 '단독 컷'**(사람 없음, 보드가 화면 90%+, 정면 사진) 기준으로 재설계. 각 편마다 ①실제 보드에 적을 원안 + ②이미지 생성 프롬프트(국문/영문). 한글 글자는 생성 AI가 자주 틀리므로, 프롬프트로 분위기·구도 시안을 뽑고 **최종 글자는 편집툴에서 얹는 것**을 권장.

## A-1. 견적서 해부 편 — 화이트보드 단독

### ① 보드에 실제로 적을 원안

```
┌────────────────────────────────────────────────┐
│        오늘의 환자 🚑 : 견적서 1장                 │
│  ──────────────────────────────                 │
│   [실제 종이 견적서 — 자석 2개로 보드 중앙 부착]      │
│   (표 형식: 기종/출고가/할부원금/요금제/부가서비스)    │
│   (일부 항목엔 손으로 그린 빨간 동그라미·화살표)        │
│                                                 │
│  ① 출고가  1,155,000원   ← "정가일 뿐"            │
│  ② 할부원금   ???    ★빨강★  "진짜 가격은 이것"     │
│  ③ "월 49,900원이면 돼요~"  ← 파랑                │
│        파랑: "폰값+요금제 섞은 말 = 비교 불가"       │
│  ④ 부가서비스 3개   ← 빨강 "왜 들어가 있죠?" ⭕      │
│  ──────────────────────────────                 │
│   비교는 월 납부액 (X) → 할부원금 (O)               │
│   [빨강 박스] 호갱 방지 질문 1호 : 할부원금이 얼마예요? │
└────────────────────────────────────────────────┘
```

펜 규칙: 검정=기본 정보 / 빨강=손해 포인트·핵심 / 파랑=눈속임 장치.

### ② 이미지 생성 프롬프트 — 화이트보드 단독

**[국문]** 가로형 알루미늄 프레임 화이트보드 한 장이 화면에 꽉 차게 정면으로 놓여 있는 사진. 사람 없음, 배경은 살짝 흐릿한 휴대폰 매장 내부. 보드는 깨끗한 흰색이고 손글씨로 마커로 또박또박 적혀 있다. 상단 중앙에 검정 마커 큰 글씨로 제목 "오늘의 환자 : 견적서 1장", 제목 옆에 작은 응급차 이모지 같은 낙서 하나. 제목 아래 가운데에 실제 종이 견적서 1장이 자석 두 개로 부착(흰 종이에 표 형식, 상단 가게 로고 자리, 아래로 기종/출고가/할부원금/요금제/부가서비스 항목이 표로 나열), 견적서 일부 항목에 손으로 그린 빨간 동그라미와 화살표. 견적서 왼쪽 여백에 세로로 네 항목(검정 손글씨): ① 출고가 1,155,000원 옆에 작게 "정가일 뿐", ② 할부원금 ??? — 이 줄만 빨간 마커로 굵게 끝에 빨간 별표, 옆에 빨간색 "진짜 가격은 이것", ③ "월 49,900원이면 돼요~" 따옴표째 파란 마커, 아래 파란색 "폰값 + 요금제 섞은 말 = 비교 불가", ④ 부가서비스 3개 검정, 옆에 빨간 마커로 "왜 들어가 있죠?"와 빨간 동그라미. 보드 하단에 검정 마커 가로줄, 그 아래 큰 글씨 결론 "비교는 월 납부액 (X) → 할부원금 (O)"에서 "할부원금"만 빨강. 맨 아래 오른쪽 구석에 빨간 마커 작은 박스 메모 "호갱 방지 질문 1호 : 할부원금이 얼마예요?". 학원 강사가 손으로 쓴 듯 깔끔하면서 약간 흘려 쓴 느낌, 균일하게 밝은 조명, 글자 또렷. 사진 스타일, 4K, 정면 구도, 보드가 프레임의 90% 이상.

**[영문]** A front-facing photo of a single horizontal aluminum-framed whiteboard filling 90%+ of the frame. No people. Slightly blurred phone-store interior in the background. Clean white board with neat handwritten marker text. Top-center black marker title "오늘의 환자 : 견적서 1장" with a tiny ambulance doodle. Below, a real paper phone price-quote sheet pinned to the center with two magnets (printed table: model / retail price / installment principal / plan / add-on services), some items circled and arrowed in red by hand. Down the left margin, four handwritten items in black: ① retail price 1,155,000 with small note "정가일 뿐"; ② installment principal "???" — this line bold in red marker with a red star, red note "진짜 가격은 이것"; ③ "월 49,900원이면 돼요~" in blue marker quotes, blue note below "폰값+요금제 섞은 말 = 비교 불가"; ④ "부가서비스 3개" in black with red note "왜 들어가 있죠?" and a red circle. Bottom: black horizontal rule, then a large conclusion "비교는 월 납부액 (X) → 할부원금 (O)" with only "할부원금" in red. Bottom-right corner: small red boxed memo "호갱 방지 질문 1호 : 할부원금이 얼마예요?". Clean, slightly loose instructor handwriting, even bright lighting, crisp legible text. Photographic style, 4K, front composition.

**섬네일 문구(편집에서 얹기):** "이 견적서, 47만 원 손해입니다" + 견적서 위 빨간 X

## A-2. 할부원금 강의 편 — 화이트보드 단독

> ※ 이 강의(A-2 대본)는 단어 10개를 다루지만, **보드는 핵심 한 개(할부원금)만 크게 시각화**하고 나머지 9개 용어는 구두로 설명하는 구성. 시각적으로 단순할수록 '진짜 가격 = 할부원금'이 각인됨.

### ① 보드에 실제로 적을 원안

```
┌────────────────────────────────────────────────┐
│  폰글리시 1강                                     │
│                                                 │
│        출고가      1,155,000원                    │
│      −  지원금       500,000원  ←빨강 "★매장마다 다름" │
│      ──────────────────                         │
│      =  할부원금    655,000원   ←빨강 굵게·밑줄2     │
│                                  빨강 "이것만 비교!" │
│                                                 │
│     ┌────────────────────────┐ ← 파랑           │
│     │ "고객님 월 6만원이면 돼요~"  │                 │
│     └────────────────────────┘                 │
│        파랑: = 폰값 + 요금제 섞은 말 = 함정          │
│                                      ────        │
│          숙제 : 매장 가서 첫 질문 →                 │
│          빨강 "할부원금 얼마예요?"                   │
└────────────────────────────────────────────────┘
```

펜 규칙: 수식·번호=검정, 핵심(할부원금)=빨강 굵게+밑줄2, 함정 박스=파랑.

### ② 이미지 생성 프롬프트 — 화이트보드 단독

**[국문]** 가로형 화이트보드가 화면에 꽉 차게 정면으로 놓인 사진. 사람 없음, 배경은 흐릿한 휴대폰 매장. 보드는 미니멀하게 손글씨 마커로 다음만 적혀 있다. 좌측 상단에 작은 검정 글씨 시리즈명 "폰글리시 1강". 보드 정중앙에 아주 크게(보드 폭의 80%) 세 줄짜리 뺄셈 수식, 검정 마커: "출고가 1,155,000원", "− 지원금 500,000원"(오른쪽에 빨간 마커 작게 "★ 매장마다 다름"), 검정 마커 가로선, "= 할부원금 655,000원"(이 줄 전체 빨간 마커로 굵게, 아래 빨간 밑줄 두 줄, 옆에 빨간색 "이것만 비교!"). 수식 아래 약간 떨어뜨려 파란 마커로 네모 박스, 안에 손글씨 "고객님 월 6만원이면 돼요~", 박스 아래 작은 파란 글씨 "= 폰값 + 요금제 섞은 말 = 함정". 보드 맨 아래 오른쪽에 검정 마커 짧은 가로선, 그 아래 "숙제 : 매장 가서 첫 질문 →" 줄 바꿔 빨간 마커로 따옴표째 "할부원금 얼마예요?". 일타강사가 칠판에 핵심만 큰 글씨로 적은 듯한 깔끔하고 시원시원한 판서, 균일한 조명, 또렷한 글자. 사진 스타일, 4K, 보드가 프레임을 거의 다 차지.

**[영문]** A front-facing photo of a horizontal whiteboard filling nearly the entire frame. No people. Blurred phone-store background. Minimal handwritten marker content. Top-left small black series label "폰글리시 1강". Dead-center, very large (80% of board width), a three-line subtraction in black marker: "출고가 1,155,000원"; "− 지원금 500,000원" with a small red note on the right "★ 매장마다 다름"; a black horizontal rule; "= 할부원금 655,000원" — this whole line bold in red marker with a double red underline and a red note "이것만 비교!". Below, slightly separated, a blue marker rectangle containing handwriting "고객님 월 6만원이면 돼요~", with a small blue note under it "= 폰값 + 요금제 섞은 말 = 함정". Bottom-right: short black rule, then "숙제 : 매장 가서 첫 질문 →" and on a new line red marker quotes "할부원금 얼마예요?". Clean, bold star-instructor board writing, even lighting, crisp legible text. Photographic style, 4K, board fills the frame.

**섬네일 문구:** "이 단어 10개 모르면 무조건 비싸게 삽니다" + 보드의 '할부원금'만 빨간 동그라미

## A-3. 자급제 vs 매장 대결 편 — 화이트보드 단독

### ① 보드에 실제로 적을 원안

```
┌───────────────────────┬───────────────────────┐
│  🟦 자급제 + 알뜰폰 ★    │  🟥 폰키호테 방학점 ★    │
│  ─────────            │  ─────────             │
│  기기 일시불 1,090,000   │  할부원금      655,000  │
│  카드 청구할인 − 70,000  │  요금제 69,000 ×6개월   │
│  알뜰 33,000×24=792,000 │  이후 33,000 ×18=594,000│
│  ───(파랑)───          │  ───(빨강)───          │
│  24개월 총액            │  24개월 총액            │
│   [ 파랑 점선 박스 ]     │   [ 빨강 점선 박스 ]     │
│  (약정X·위약금X /        │  (69,000 6개월 유지 /    │
│   셀프개통·목돈 한번에)   │   이후 자유)            │
├──────────VS──────────┴───────────────────────┤
│   조건 따라 승자 바뀜! → 계산법을 가져가세요         │
│   ※ 촬영일 기준 예시. 댓글로 기종 주시면 계산해드림   │
└────────────────────────────────────────────────┘
```

펜 규칙: 가운데 세로선·VS·하단 결론=검정 / 좌측 진영=파랑 / 우측 진영=빨강. 총액 칸은 영상 마지막까지 점선 박스로 비워뒀다 라이브로 채움(결과 숨기기 = 시청 지속).

### ② 이미지 생성 프롬프트 — 화이트보드 단독

**[국문]** 가로형 화이트보드가 화면에 꽉 차게 정면으로 놓인 사진. 사람 없음, 배경은 흐릿한 매장. 보드는 세로로 정확히 반 나뉘며, 가운데에 검정 마커로 세로선이 위에서 아래까지, 세로선 한가운데에 큰 검정 글씨 "VS"(주변에 강조 빗금 낙서). 왼쪽 진영은 전부 파란 마커 손글씨: 상단 큰 제목 "자급제 + 알뜰폰" 옆 파란 별표, 그 아래 "기기 일시불 1,090,000원", "카드 청구할인 − 70,000원", "알뜰 요금제 33,000원 × 24개월 = 792,000원", 빈 줄 후 파란 가로선, 그 아래 "24개월 총액" 옆 칸은 비어 있고 파란 점선 박스만(여기 채울 자리 표시), 좌측 하단 구석에 파란색 작은 메모 "장점 : 약정 X, 위약금 X / 단점 : 셀프 개통, 목돈 한 번에". 오른쪽 진영은 전부 빨간 마커 손글씨: 상단 큰 제목 "폰키호테 방학점" 옆 빨간 별표, 그 아래 "할부원금 655,000원", "요금제 69,000원 × 6개월 = 414,000원", "이후 33,000원 × 18개월 = 594,000원", 빈 줄 후 빨간 가로선, 그 아래 "24개월 총액" 옆 칸은 비어 있고 빨간 점선 박스만, 우측 하단 구석에 빨간색 작은 메모 "조건 : 69,000 요금제 6개월 유지 / 이후 자유". 보드 맨 아래(좌우 통합) 검정 마커 두 줄: 큰 글씨 "조건 따라 승자 바뀜! → 계산법을 가져가세요", 작은 글씨 "※ 위 숫자는 촬영일 기준 예시. 댓글로 기종 주시면 계산해 드림". 운동 경기 점수판처럼 좌우 대결 구도가 한눈에, 양쪽 마커 색이 명확히 대비. 균일한 조명, 또렷한 글자. 사진 스타일, 4K, 보드가 프레임 90% 이상.

## 대본 A-1. 「이 견적서, 어디서부터 잘못됐을까요?」 (목표 10분)

**[0:00–0:25 훅]**
(보드 앞, 견적서를 카메라에 들이밀며)
사장: 이거, 구독자분이 다른 매장에서 받아온 견적서입니다. 제가 처음 보고 좀 놀랐어요. 결론부터 말씀드리면 — 이대로 계약하셨으면, 2년 동안 약 47만 원을 더 내실 뻔했습니다. 47만 원이면 요즘 좋은 무선이어폰에 스마트워치까지 사고도 남는 돈이에요. 근데 이게 그 손님 잘못이냐? 절대 아니에요. 견적서가 원래 못 알아보게 생겼습니다. 오늘 제가 이 한 장을, 펜 들고 처음부터 끝까지 다 해부해 드릴게요. 끝까지 보시면, 다음에 어느 매장 가셔도 5초 만에 호갱인지 아닌지 판별하실 수 있습니다.
[자막: 실제 제보 견적서 / 매장명·개인정보 모자이크]

**[0:25–1:30 도입 — 공감 + 오늘의 지도]**
사장: 견적서 받아보신 분들, 솔직히 무슨 말인지 하나도 모르겠죠? 출고가, 공시, 선약, 부가서비스, 월 납부액… 외계어예요. 근데 이거 일부러 어렵게 만든 거 맞습니다. 손님이 모를수록 이득 보는 쪽이 있거든요. 식당으로 치면, 메뉴판에 가격을 안 적어놓는 거랑 똑같아요. 근데 걱정 마세요. 이 복잡한 종이에서 딱 네 군데만 볼 줄 알면 됩니다. 오늘 그 네 개를 하나씩, 보드에 적으면서 보여드릴게요. (보드에 ①~④ 번호 적기) 자, 갑니다.

**[1:30–2:40 ① 출고가 — 함정 아님]**
사장: 첫째, 맨 위에 출고가. 1,155,000원. 이건 사실 함정이 아니에요. 그냥 제조사가 정한 정가예요. 백화점 정가표라고 보시면 돼요. 어느 매장을 가든 이 숫자는 똑같습니다. 그래서 여기서 속을 일은 없어요. 다만 한 가지. 어떤 매장은 상담 시작할 때 이 출고가만 크게 보여주면서 "고객님 이게 115만 원짜리예요" 하고 비싼 폰이라는 인상부터 심습니다. 그래야 나중에 "근데 저희가 이만큼 깎아드려요" 할 때 더 싸 보이거든요. 출고가는 시작점일 뿐이다. 여기 속지 마세요. 진짜 게임은 그 아래 줄부터입니다.

**[2:40–4:30 ② 할부원금 — 핵심 중의 핵심]**
사장: 둘째, 그리고 오늘의 주인공. 할부원금. (빨간펜으로 크게 동그라미) 자, 이 견적서 보세요. 출고가는 큼지막하게 적혀 있는데… 할부원금은? 안 적혀 있죠. 이게 제일 큰 문제예요. 할부원금이 뭐냐. '내가 이 폰을 실제로 사는 진짜 가격'입니다. 출고가에서 매장이 깎아주는 지원금을 다 뺀, 최종 폰값이에요. 이게 없는 견적서는요, 아까 말한 가격표 없는 메뉴판입니다. 음식 시켰는데 얼마인지 모르고 먹는 거랑 똑같아요. 그러니까 견적서에 이 줄이 없으면, 그 자리에서 딱 물어보세요. "그래서 할부원금이 정확히 얼마예요?" 이 질문에 숫자 하나로 딱 안 나오고, "아 그게 요금제 합쳐서~" 하면서 말을 돌리잖아요? 그럼 일어나서 나오시면 됩니다. 정직한 매장은 이거 0.5초 만에 대답해요. 맨 윗줄에 적혀 있으니까.
[자막: 호갱 방지 질문 1호 — "할부원금 얼마예요?"]

**[4:30–6:00 ③ "월 49,900원"의 함정]**
사장: 셋째. 이 견적서에서 제일 크게, 빨간 글씨로 적혀 있는 게 뭐죠? "월 49,900원." (파란펜으로 표시) 이게 바로 함정 장치예요. 왜 함정이냐. 이 4만 9천9백 원 안에는 폰값 할부금이랑 통신 요금제가 같이 섞여 있어요. 두 개를 일부러 합쳐서 한 덩어리로 보여주는 겁니다. 생각해보세요. 요금제는 어차피 어느 매장에서 사든, 통신사가 정한 거라 똑같이 내는 돈이에요. 매장이 손댈 수 없어요. 그러니까 비교를 하려면 폰값만 쏙 빼서 봐야 하는데, 이렇게 합쳐놓으면 비교 자체가 불가능해집니다. A매장은 "월 5만 원", B매장은 "월 4만 8천 원" 하면 B가 싸 보이죠? 근데 B는 요금제를 더 비싼 걸 끼워놨을 수 있어요. 월 납부액으로 비교하는 순간, 매장이 짜놓은 판에서 노는 거예요. 다시. 비교는 월 납부액이 아니라 할부원금으로.

**[6:00–7:30 ④ 부가서비스 — 조용히 새는 돈]**
사장: 넷째. 견적서 밑부분 깨알같이 작은 글씨, 보이세요? 부가서비스 세 개가 슬쩍 들어가 있어요. 보험, 음악 스트리밍, 뭐 클라우드. 합치면 월 16,500원. 별거 아닌 거 같죠? 2년이면 약 40만 원입니다. 자, 여기서 매장이 뭐라고 하냐면 — "고객님 이거 한 달만 유지하시고 그다음에 해지하시면 돼요. 그래야 지원금이 더 나와요." 말은 맞아요. 근데 현실은? 그 한 달 뒤에 해지하는 거, 까먹는 분이 절반이 넘어요. 사람이 어떻게 한 달 뒤를 기억해요. 매장은 그걸 알고 넣는 겁니다. 절반은 까먹는다는 걸 계산에 넣고 권하는 거예요. 그러니까 견적서에 내가 신청한 적 없는 항목이 있으면 무조건 물어보세요. "이거 지금 빼면 조건 달라져요?" 안 달라지면 그냥 빼달라고 하시고, 달라지면 얼마나 달라지는지 숫자로 보여달라고 하세요.

**[7:30–8:40 ★보너스 — 약정과 위약금 (구두 설명)]**
사장: 자, 네 개 다 봤는데, 견적서엔 잘 안 보이지만 꼭 챙겨야 할 게 하나 더 있어요. 약정, 그리고 위약금. 이 견적서, 지원금을 많이 받는 대신 2년 약정이 걸려 있어요. 중간에 요금제를 내리거나 해지하면, 받았던 지원금의 일부를 다시 토해내야 합니다. 이걸 위약금, 정확히는 '할인반환금'이라고 해요. 그래서 "6개월만 이 요금제 쓰세요" 이 조건이 진짜 중요한 거예요. 견적이 아무리 싸 보여도, 이 약정 조건을 안 보면 나중에 뒤통수 맞습니다. 꼭 물어보세요. "요금제 며칠 유지하면 위약금 없어요?" 이거 명확하게 적어주는 매장이 정직한 매장입니다.

**[8:40–10:00 정리 + CTA]**
사장: 자, 정리합니다. (보드 결론 칸 가리키며) 하나, 출고가는 시작점일 뿐 함정 아니다. 둘, 비교는 무조건 할부원금으로. 셋, 월 납부액은 폰값이랑 요금제 섞인 거라 비교용으로 못 쓴다. 넷, 모르는 부가서비스는 빼달라고 한다. 그리고 보너스, 약정이랑 위약금 조건을 꼭 확인한다. 이것만 들고 가시면, 어느 매장에서도 호갱 안 됩니다. 저희 폰키호테 방학점은요, 이걸 손님이 안 물어봐도 먼저 종이에 다 적어서 드려요. 할부원금 맨 윗줄에, 약정 조건까지. 그게 정상이라고 생각하거든요. 마지막으로 부탁 하나. 지금 견적서 들고 헷갈리는 분 계시면, 사진 찍어서 댓글이나 채널 카톡으로 보내주세요. 다음 영상에서 제가 직접, 오늘처럼 보드에 놓고 같이 해부해 드릴게요. 어디서 사시든 상관없어요. 호갱만 되지 마세요. 그거면 됩니다.
[종료 화면: "내 견적서 보내기" 안내]

## 대본 A-2. 「폰글리시 1강 — 이 단어 10개면 호갱 졸업」 (목표 10분)

**[0:00–0:20 훅]**
사장: 휴대폰 가게 사장인 제가 솔직하게 말씀드릴게요. 손님이 이 단어들을 모르고 매장에 들어오시면… 비싸게 팔 수 있습니다. 진짜로요. 저는 안 그러는데, 그러는 데가 많아요. 근데 반대로, 이 단어 딱 열 개만 알고 들어오시면? 그 순간부터 직원이 함부로 못 합니다. '아 이분 아는 분이네' 하고 견적이 달라져요. 오늘 그 열 개, 10분 안에 다 떠먹여 드립니다. 메모 안 하셔도 돼요. 핵심은 보드에 다 적을 거니까 캡처만 하세요.

**[0:20–1:10 ① 출고가]**
사장: 첫 번째 단어. 출고가. (보드에 적으며) 쉬워요. 제조사가 정한 정가예요. 삼성이 "이 폰 115만 5천 원에 파세요" 하고 못 박은 가격. 그래서 어느 매장을 가든 출고가는 똑같습니다. 여기서 기억할 거 딱 하나. 출고가는 '정가'지 '내가 낼 돈'이 아니에요. 백화점 옷에 붙은 정가표 같은 거예요. 그 가격 그대로 내는 사람은 거의 없죠. 출고가는 그냥 출발점이다, 이것만.

**[1:10–2:10 ② 공시지원금]**
사장: 두 번째. 공시지원금, 줄여서 '공시'. 이건 통신사가 공식적으로 "이 폰 사면 이만큼 깎아드립니다" 하고 홈페이지에 공개한 할인이에요. 공시니까 공개됐다는 뜻이에요. 이건 누구나 볼 수 있어요. SK, KT, LG 홈페이지 들어가면 다 나와 있습니다. 기종마다, 요금제마다 금액이 달라요. 비싼 요금제 쓰면 공시가 더 많이 나오고요. 여기까진 다 똑같아요. 매장이 손 못 대는 영역이에요. 자, 그럼 매장마다 가격이 왜 다르냐? 다음 단어가 진짜입니다.

**[2:10–3:20 ③ 추가지원금 (매장 지원)]**
사장: 세 번째. 추가지원금. (★빨간펜 강조) 이게 매장마다 가격이 달라지는 진짜 이유예요. 공시지원금 위에, 매장이 자기 몫에서 손님한테 더 얹어주는 할인이에요. 법적으로는 공시지원금의 15%까지 추가로 줄 수 있게 돼 있어요. 근데 여기서 핵심은 — 매장이 이걸 얼마나 주느냐는 매장 맘이라는 거예요. 어떤 데는 거의 안 줘요. 그럼 비싸지죠. 어떤 데는 많이 줘요. 그럼 싸지고요. 똑같은 폰인데 매장마다 가격이 다른 이유, 99%가 이 추가지원금 차이입니다. 그래서 우리가 매장을 비교하는 이유가 바로 이거예요.

**[3:20–4:50 ④ 할부원금 — 오늘의 주인공]**
사장: 네 번째. 그리고 오늘 제일 중요한 단어. 할부원금. (★빨간 박스) 이거 하나만 가져가셔도 오늘 영상 본 보람 있어요. 할부원금이 뭐냐. 지금까지 나온 걸로 계산하면 돼요. 출고가에서, 공시지원금 빼고, 추가지원금 빼면 — 남는 게 할부원금입니다. (보드에 뺄셈 적으며) 115만 5천 원에서 지원금 50만 원 빼면, 65만 5천 원. 이게 할부원금. 즉, '내가 이 폰을 실제로 사는 진짜 가격'이에요. 폰의 실구매가요. 자 여기서 중요한 거. 매장 가서 다른 거 다 까먹어도 이 질문 하나는 하세요. "이 폰 할부원금이 얼마예요?" 출고가 말고, 월 얼마 말고, 할부원금. 이 숫자 하나만 두 군데서 받아 적으면 어디가 싼지 바로 나옵니다.

**[4:50–5:50 ⑤ 선택약정]**
사장: 다섯 번째. 선택약정, 줄여서 '선약'. 이건 갈림길이에요. 아까 공시지원금은 폰값을 깎아주는 거였죠. 근데 어떤 분들은 폰값 할인 대신, 매달 통신 요금을 25% 깎아주는 걸 고를 수 있어요. 그게 선택약정이에요. 둘 중 하나만 골라야 해요. 폰값 깎을래(공시지원금), 요금 25% 깎을래(선택약정). 보통은요, 자급제로 폰을 따로 산 분들이나, 지원금이 적게 나오는 기종은 선택약정이 유리해요. 매장에서 폰 사면서 지원금 많이 받는 분들은 공시가 유리하고요. 이건 기종마다 계산이 달라서, 다음 폰글리시 2강에서 통째로 다룰게요. 오늘은 '요금 25% 깎는 선택지도 있다'만 기억하세요.

**[5:50–6:50 ⑥ 요금제 유지 조건]**
사장: 여섯 번째. 요금제 유지. 이건 단어라기보단 조건인데, 진짜 중요해요. 매장에서 "지원금 많이 드릴게요" 할 때 거의 항상 따라붙는 게 "대신 이 요금제를 몇 개월 유지하세요"예요. 보통 6개월. 무슨 뜻이냐면, 처음 6개월은 좀 비싼 요금제를 쓰고, 그 뒤에 싼 걸로 내려도 된다는 거예요. 근데 함정이 있어요. 6개월 안 채우고 일찍 내리면? 위약금이 나와요. 그래서 견적 받을 때 꼭 물어봐야 해요. "요금제 며칠 유지하면 돼요? 그 전에 내리면 얼마 물어요?" 이걸 안 물어보고 덜컥 계약하면, 나중에 요금제 내리려다 위약금 폭탄 맞습니다.

**[6:50–7:40 ⑦ 부가서비스]**
사장: 일곱 번째. 부가서비스. 이건 폰이랑 별개로 매달 돈 나가는 월정액 서비스들이에요. 휴대폰 보험, 음악 앱, 영상 앱, 클라우드 저장공간 이런 거. 한 개에 월 5천 원~만 원씩. 매장에서 "이거 가입하면 지원금 더 나와요" 하면서 두세 개 끼워요. 한 달 뒤 해지하면 된다는데, 까먹으면 2년 내내 돈 나갑니다. 그러니까 견적서에 내가 신청 안 한 부가서비스 있으면 체크하세요. "이거 빼면 조건 달라져요?" 안 달라지면 빼고, 달라지면 숫자로 확인.

**[7:40–8:30 ⑧ 위약금 (할인반환금)]**
사장: 여덟 번째. 위약금. 정확한 이름은 '할인반환금'이에요. 이게 뭐냐. 지원금이나 요금할인을 받는 건 사실 '2년 약정'이 조건이에요. 2년 동안 이 통신사 쓸게요, 약속하고 할인받는 거죠. 근데 중간에 해지하거나 요금제를 막 바꾸면, 받았던 할인의 일부를 다시 토해내야 해요. 그게 위약금입니다. 그래서 폰 바꾸기 전에 꼭 확인할 게 있어요. 지금 쓰는 폰 약정이 얼마나 남았는지. 약정 끝나기 직전에 바꾸면 위약금이 거의 없어요. 한참 남았는데 바꾸면 위약금이 할인보다 클 수도 있어요. 이게 호갱의 숨은 함정이에요.

**[8:30–9:15 ⑨ 자급제 + ⑩ 성지]**
사장: 아홉 번째, 열 번째 한 번에 갈게요. 자급제. 통신사 안 끼고, 폰만 따로 제값 주고 사는 거예요. 쿠팡이나 삼성닷컴에서 폰만 딱 사는 거. 그리고 거기에 알뜰폰 요금제를 붙이는 게 요즘 유행이죠. 약정도 없고 자유로워요. 대신 지원금이 없어서 폰값은 비싸게 주고요. 마지막 열 번째, 성지. 이건 정식 용어는 아니고 은어예요. 지원금을 많이 줘서 폰을 싸게 파는 매장을 사람들이 '성지'라고 불러요. 근데 다음 영상에서 다루겠지만, 성지라고 다 좋은 건 아니에요. 진짜 성지랑 사기 치는 데를 구별하는 법이 따로 있어요.

**[9:15–10:00 마무리 + 숙제 + 다음 화 예고]**
사장: 자, 열 개 다 했습니다. (보드 가리키며) 출고가, 공시지원금, 추가지원금, 할부원금, 선택약정, 요금제 유지, 부가서비스, 위약금, 자급제, 성지. 이 열 개면 여러분 오늘부로 호갱 졸업이에요. 근데 이 중에 딱 하나만 외우라면? 네 번째, 할부원금. 숙제 나갑니다. 이번 주에 매장 지나가시면, 살 거 아니어도 한번 들어가서 물어보세요. "이 기종 할부원금 얼마예요?" 그 답을 댓글에 지역이랑 같이 적어주세요. 제가 다음 영상에서 지역별 시세로 정리해 드릴게요. 폰글리시 2강은 아까 말한 '공시지원금 vs 선택약정, 뭐가 이득인지' 계산법 들고 오겠습니다. 폰키호테 방학점이었습니다.

## 대본 A-3. 「자급제 vs 우리 매장, 계산해서 진 쪽이 인정합니다」 (목표 10분)

**[0:00–0:30 훅]**
사장: "자급제에 알뜰폰이 무조건 제일 싸다." 유튜브에 이 말 진짜 많죠. 댓글에도 맨날 달려요. "사장님 그냥 자급제 사세요 ^^" 하고. 근데 저는 폰 파는 사람이잖아요. 제가 "아니에요 매장이 더 싸요" 하면 믿으시겠어요? 안 믿으시겠죠. 당연해요. 그래서 오늘은 제가 말로 설득 안 합니다. 그냥 계산만 해요. 자급제 루트랑 저희 매장 루트, 24개월 총비용 끝까지 다 더해서, 진짜로 어디가 싼지 보드에 까놓겠습니다. 지면 제가 인정해요. 자급제 사시라고 말씀드릴게요.

**[0:30–1:40 룰 설명 — 공정성 세팅]**
사장: 싸움도 룰이 공정해야 인정하잖아요. 룰부터 정합니다. 첫째, 같은 기종. 오늘은 갤럭시 S24 예시로 갈게요. 둘째, 같은 기간. 24개월. 셋째, 데이터 사용량도 똑같다고 칠게요. 넷째, 자급제 쪽도 제가 최대한 싸게, 봐주는 거 없이 빡세게 계산할게요. 카드 할인 같은 거 다 챙겨드려요. 자급제 편을 제가 직접 들어주는 거예요. 그래야 공정하잖아요. 숫자는 오늘 기준 예시고, 실제 시세는 촬영 시점마다 바뀌니까 댓글로 기종 적어주시면 그걸로 다시 계산해 드립니다. 자, 보드 반으로 나눕니다. 왼쪽 파란색이 자급제, 오른쪽 빨간색이 저희 매장.

**[1:40–3:50 자급제 진영 계산 (파란펜)]**
사장: 먼저 자급제. (왼쪽에 적으며) S24 자급제 일시불, 쿠팡 기준 1,090,000원이라고 칠게요. 여기서 카드 청구할인, 잘 찾으면 7만 원 정도 받아요. 그럼 폰값 1,020,000원. 자 폰은 이게 끝이에요. 깔끔하죠. 그다음 요금제. 자급제의 핵심은 알뜰폰이에요. 데이터 넉넉한 알뜰폰 요금제가 월 33,000원이라고 칠게요. 24개월이면 33,000 곱하기 24… (계산기 두드리고 적는다) 792,000원. 자 더해봅시다. 폰값 1,020,000 더하기 요금제 792,000 = 1,812,000원. (크게 적는다) 자급제 24개월 총액, 181만 2천 원. 솔직히 말씀드릴게요. 이거 좋은 루트 맞아요. 약정 없고, 위약금 없고, 마음대로 갈아탈 수 있어요. 근데 두 가지가 셀프예요. 개통도 셀프, 나중에 문제 생겨도 셀프. 그리고 폰값 100만 원이 카드값으로 한 번에 훅 나갑니다. 이건 기억해두세요.

**[3:50–6:20 매장 진영 계산 (빨간펜)]**
사장: 자 이제 저희 쪽. (오른쪽에 적으며) 똑같이 S24. 할부원금 655,000원이라고 칠게요. 이거 일시불로 내셔도 되고 할부로 하셔도 돼요. 자 여기서 제가 솔직하게 조건을 다 깝니다. 숨기면 의미 없으니까. 조건은 69,000원짜리 요금제를 6개월 유지. 그 후엔 내리셔도 돼요. 그러면 계산이 이렇게 돼요. 처음 6개월은 69,000원, 곱하기 6 = 414,000원. (적는다) 그다음 18개월은 33,000원짜리 싼 걸로 내려요. 33,000 곱하기 18 = 594,000원. (적는다) 자 다 더합니다. 폰값 655,000 더하기 처음 6개월 414,000 더하기 나머지 18개월 594,000 = 1,663,000원. (크게 적는다) 저희 매장 24개월 총액, 166만 3천 원.
[자막: 조건까지 전부 공개하는 게 이 영상의 목적입니다]
사장: 여기서 중요한 거. 제가 이 '6개월 비싼 요금제' 조건을 숨겼으면 더 싸 보였겠죠? 근데 그거 숨기는 게 호갱 만드는 거예요. 그래서 다 깝니다.

**[6:20–8:00 결과 발표 + 반전]**
사장: 자, 양쪽 다 나왔어요. 자급제 181만 2천 원. 저희 매장 166만 3천 원. (양쪽 총액에 동시에 손) 이 예시에선… 저희가 약 15만 원 쌉니다. 네, 이 경우엔 매장이 이겼어요. 근데! (펜 탁 내려놓으며) 여기서 끝내면 저도 똑같은 장사꾼이에요. 솔직하게 말씀드릴게요. 항상 그런 거 아니에요. 지원금이 짜게 풀리는 기종이 있어요. 특히 아이폰 신상 일부 모델은 지원금이 거의 없어서, 그런 건 자급제가 이깁니다. 확실하게요. 또 데이터를 엄청 적게 쓰시는 분, 통화만 하시는 어르신들은 알뜰폰 자급제가 압도적으로 싸요. 그러니까 결론은 '어디가 무조건 싸다'가 아니에요. 진짜 결론은 이거예요. (보드 하단 가리키며) **계산법을 가져가시라.** 할부원금 더하기 요금제 조건 차액, 이게 자급제 폰값 더하기 알뜰 요금제보다 싼지 비싼지. 종이랑 계산기만 있으면 5분이면 나와요.

**[8:00–9:00 자주 하는 실수 2가지]**
사장: 제가 이 일 하면서 제일 안타까운 경우 두 가지 알려드릴게요. 첫째, 자급제가 싼 기종인데 그걸 모르고 매장 가서 비싸게 사는 분. 둘째, 반대로 지원금 많이 풀리는 기종인데 "자급제가 무조건 싸다더라" 하고 자급제로 비싸게 사는 분. 둘 다 계산을 안 해봐서 생기는 일이에요. 유튜브에서 "무조건 A가 싸다" 하는 말, 그거 기종이랑 시기 빼고 하는 말이라 반은 틀려요. 폰은요, 기종마다 그 주의 지원금 시세마다 답이 매번 바뀌어요. 그래서 외울 게 아니라 계산할 줄 알아야 하는 거예요.

**[9:00–10:00 CTA]**
사장: 자 오늘 영상 정리. 자급제냐 매장이냐, 정답은 '계산'이다. 그 계산법 오늘 다 알려드렸고요. 직접 하기 귀찮으시면? 저한테 시키세요. 댓글에 '기종 + 한 달 데이터 사용량' 두 개만 적어주세요. 예를 들어 "S24, 한 달 20기가" 이렇게. 그럼 제가 다음 영상에서 그 조건으로 보드에 놓고, 자급제가 싼지 매장이 싼지 계산해서 알려드릴게요. 그리고 혹시 방학동 근처 사시면, 계산서 들고 매장으로 오셔도 돼요. 와서 "사장님 자급제가 이만큼인데 이겨보세요" 하시면, 제가 못 이기는 조건일 땐 진짜로 "그건 자급제로 사세요" 말씀드립니다. 저 그렇게 장사해요. 그게 이 채널이 오래가는 길이라고 믿거든요. 폰키호테 방학점이었습니다.

# PART 3. 인터뷰형 대본 3편 (각 ~10분 본편)

공통 연출: 질문자(마케터)는 화면 밖 목소리. 사장은 카운터나 매장 의자에 앉은 자연스러운 세팅. 대본은 '구조 + 답변 가이드'로 작성 — 사장님이 토씨까지 외우면 어색해지므로, 핵심 문장(★)만 그대로 살리고 나머지는 본인 말투로 소화하게 함. 각 영상에 숏츠 컷 포인트 표시.

## 대본 B-1. 「사장님, 솔직히 성지 사기 아니에요?」 (본편 ~10분 + 숏츠 3개)

**[0:00–0:15 콜드오픈]** ※숏츠 컷 ①
Q(화면 밖): 사장님. 솔직히… 성지, 사기 아니에요?
(2초 정적. 사장, 피식 웃고)
사장: 와, 첫 질문부터 이러기예요?
Q: 다들 궁금해하는 거라서요.
사장: ★맞아요, 사기 같은 데… 실제로 있어요. 그래서 그 질문이 나오는 거고요.★

**[0:15–1:40 불신의 정체 인정하기]**
Q: 사장님이 그걸 인정하시는 거예요?
사장: 인정해야죠. 손님 입장에서 보면 이상하잖아요. 같은 갤럭시 S24인데, 어떤 데는 100만 원, 어떤 데는 60만 원. 40만 원 차이. 정상이면 이게 말이 돼요? '뭔가 구린 거 아냐?' 하는 게 당연한 거예요. 저도 이 일 시작하기 전엔 똑같이 생각했어요. '성지? 분명 뭔가 빼먹는 거 있겠지.'
Q: 근데 막상 들어와 보니 어땠어요?
사장: 진짜 빼먹는 데도 있고, 진짜 싸게 주는 데도 있더라고요. 둘이 섞여 있으니까 손님이 구별을 못 하는 거예요. 그래서 다 같이 사기꾼 취급받는 거고. 정직하게 싸게 파는 사람들 입장에선 좀 억울하죠.

**[1:40–3:20 가격 차이의 진짜 정체]**
Q: 그럼 그 가격 차이는 대체 어디서 나는 거예요? 진짜 궁금해요.
사장: 자, 매장이 폰을 한 대 팔면 통신사한테 판매 수수료를 받아요. 이게 매장 수입이에요. 근데 이 수수료 중에 얼마를 손님한테 다시 돌려주느냐, 이게 매장마다 다른 거예요. 어떤 매장은 수수료를 거의 다 자기가 먹어요. 그럼 손님은 비싸게 사는 거죠. 어떤 매장은 수수료 대부분을 손님한테 지원금으로 돌려줘요. 대신 자기는 박하게 남기고 많이 파는 걸로 가는 거예요. 그게 소위 성지고요.
Q: 그러니까 마법이 아니라…
사장: ★마법이 아니라 배분의 문제예요. 같은 수수료를 누가 먹느냐. 매장이 먹으면 비싸지고, 손님한테 돌려주면 싸지는 거.★ 폰 자체에 무슨 하자가 있거나 그런 게 절대 아니에요. 똑같은 새 폰이에요.

**[3:20–5:10 진짜 사기 구별법 — 3가지]** ※숏츠 컷 ②
Q: 그럼 손님 입장에서, 진짜 '사기 같은 곳'이랑 '정직하게 싼 곳'을 어떻게 구별해요?
사장: 딱 세 가지만 보세요. ★첫째, 할부원금을 끝까지 안 알려준다. 둘째, 조건을 말로만 하고 종이에 안 적어준다. 셋째, 오늘 아니면 안 된다고 재촉한다.★ 이 세 개 중에 하나라도 걸리면, 그냥 나오세요.
Q: 하나씩 좀 풀어주세요. 첫째, 할부원금.
사장: 아까 말했듯이 할부원금이 진짜 폰값이에요. 이걸 안 알려주고 "월 얼마예요"로만 말하는 데는, 폰값을 숨기고 싶은 거예요. 숨길 이유가 뭐겠어요. 비싸니까.
Q: 둘째, 종이에 안 적어준다.
사장: 말로만 "고객님 이거 다 해드릴게요" 하고 정작 계약서엔 다르게 적는 데가 있어요. 나중에 따지면 "제가 그런 말 했어요?" 그래요. 그래서 조건은 무조건 종이로 받으셔야 해요. 녹음도 좋고요.
Q: 셋째, 재촉.
사장: "이 조건 오늘까지만이에요, 지금 안 하면 없어져요." 이거 99% 거짓말이에요. 손님이 비교 못 하게, 생각 못 하게 몰아붙이는 거예요. 진짜 싼 데는 재촉 안 해요. 비교해보고 오시라고 해요. 어차피 비교해도 자기가 싸니까.

**[5:10–6:30 폰키호테는 어떤가]**
Q: 그럼 폰키호테는 이 세 가지를 어떻게 하세요?
사장: 정반대로 해요. 할부원금 맨 위에 적어드리고, 조건 전부 종이에 써드리고, 재촉 안 해요. 오히려 제가 그래요. "이거 들고 다른 매장 두 군데 더 가보세요." 진짜로요.
Q: 손님 뺏기면 어떡해요?
사장: 비교당해서 지면, 그건 제가 부족한 거예요. 인정해야죠. 근데 대부분은 다시 오세요. 왜냐면 비교해보면 알거든요. 똑같이 적어주는 데가 별로 없어요. 비교 자체가 저한텐 영업이에요.

**[6:30–8:00 사장 개인 서사]**
Q: 근데 왜 굳이 이 동네에서, 이렇게까지 하세요? 더 편하게 장사할 수도 있잖아요.
사장: 방학동이 제 동네거든요. 제가 여기서 나고 자랐어요. 사기 치면요, 마트에서 그 손님 또 만나요. (웃음) 동네 장사는 그게 무서운 거예요. 한 분한테 잘못하면, 그분이 경로당 가서 열 분한테 얘기해요. "거기 가지 마라" 하고. 끝나는 거예요.
Q: 반대로는요?
사장: 반대로 한 분한테 잘하면, 그 어머님이 따님 데려오시고, 아들 데려오시고, 옆집까지 데려오세요. 저는 그게 진짜 남는 장사라고 봐요. 한 번 크게 남기고 끝낼 거냐, 작게 남기고 10년 갈 거냐. 저는 후자 택한 거예요.

**[8:00–9:10 그래도 의심하는 사람에게]**
Q: 근데 솔직히, 여기까지 듣고도 '에이 그래도 뭔가 있겠지' 하는 분들 있을 거예요.
사장: 당연하죠. 저라도 그래요. 말로는 누구나 정직하다고 하니까.
Q: 그분들한테는 뭐라고 하시겠어요?
사장: 그래서 제가 말이 아니라 종이로 증명하는 거예요. 안 믿으셔도 돼요. 대신 딱 하나만 해보세요. 저희 와서 견적서만 받아 가세요. 사는 건 그 종이 들고 다른 데 가서 비교해보고 결정하시면 돼요. 비교해서 다른 데가 싸면 거기서 사세요. 진짜로 괜찮아요.

**[9:10–10:00 마무리]** ※숏츠 컷 ③
Q: 마지막으로, 아직도 '성지=사기'라고 생각하는 분들께 한마디.
사장: ★안 믿으셔도 돼요. 대신 견적서만 받아 가세요. 사는 건 비교해 보고 결정하시면 됩니다. 저희는 비교당하는 거, 진심으로 환영해요.★ 그게 자신 있다는 뜻이니까요. 자신 없는 데가 재촉하고 숨기는 거예요. 저희는 반대로 할게요.
[종료 자막: 견적 비교 환영 — 폰키호테 방학점]

## 대본 B-2. 「이 폰 팔면 사장님은 얼마 남아요?」 (본편 ~10분 + 숏츠 2개)

**[0:00–0:15 콜드오픈]** ※숏츠 컷 ①
Q: 사장님, 이거(폰 들어 보이며) 한 대 팔면 얼마 남아요?
사장: …그걸 물어본다고요? 카메라 앞에서?
Q: 네. 다들 궁금하니까요.
사장: (한숨, 웃음) 좋아요. 이거 업계에서 저 욕먹을 수도 있는데… 갑니다. 솔직하게.

**[0:15–1:50 수익 구조 공개]**
Q: 그래서, 한 대 팔면 진짜 얼마 남아요?
사장: 먼저 구조부터 설명할게요. 그래야 이해가 되니까. 매장이 폰을 한 대 개통하면, 통신사에서 '판매 수수료'라는 걸 줘요. 이게 매장 수입의 본체예요. 기종마다, 그 달 정책마다 천차만별인데, 한 대에 몇십만 원 단위예요.
Q: 몇십만 원이요? 생각보다 큰데요?
사장: 큰 거 같죠? 근데 여기서 다 나가요. 매장 임대료 내야지, 직원 월급 줘야지, 전기세 내야지. 그리고 제일 중요한 거 — 이 수수료 중에 얼마를 손님한테 지원금으로 돌려드릴지를 여기서 정하는 거예요. 그러니까 제 손에 실제로 남는 건, 그 수수료에서 손님 지원금이랑 운영비 다 빼고 남는 거예요.

**[1:50–3:30 싸게 주는 매장의 비밀]**
Q: 그럼 싸게 주는 매장은 뭐가 다른 거예요? 수수료를 더 많이 받는 거예요?
사장: 아니에요. 수수료는 비슷해요. 차이는 그걸 어떻게 쓰냐예요. ★많이 팔아서 한 대당 박하게 남기느냐, 적게 팔아서 한 대당 두껍게 남기느냐. 그 차이예요. 저희는 전자예요.★
Q: 좀 더 풀어주세요.
사장: 예를 들어볼게요. 한 분한테 40만 원 남기는 매장이 있어요. 손님은 비싸게 산 거죠. 그 매장은 하루에 한두 명만 팔아도 돼요. 반대로 저희는 한 분한테 8만 원만 남겨요. 대신 하루에 다섯 분, 여섯 분 오세요. 합치면 비슷하거나 제가 더 벌어요. 근데 손님 입장에선? 8만 원 남기는 데서 사는 게 무조건 이득이잖아요. 같은 폰을 32만 원 싸게 사는 거니까.
Q: 그러니까 손님이 많이 와야 이게 돌아가는 거네요.
사장: 정확해요. 그래서 제가 유튜브를 하는 거예요. (웃음) 많이 오셔야 박하게 남겨도 먹고사니까.

**[3:30–5:20 불편한 질문 더 밀기]** ※숏츠 컷 ②
Q: 그럼 부가서비스나 비싼 요금제 권하는 건 왜 그래요? 그것도 돈 되니까예요?
사장: 솔직히 네. 부가서비스도, 비싼 요금제도 매장한테 수수료가 더 붙어요. 그래서 권하는 거 맞아요. 이건 부정 안 할게요.
Q: 어… 그럼 사장님도 권하세요?
사장: 권할 순 있어요. 근데 저희 원칙은 이거예요. 권하되, 손님이 "빼주세요" 하면 군말 없이 뺀다. 그리고 빼면 조건이 달라지는 경우엔 — 예를 들어 그거 빼면 지원금이 줄어든다 하면 — 얼마나 달라지는지 숫자로 정확히 보여드리고, 손님이 직접 고르게 해요. "이거 유지하면 5만 원 더 받고, 빼면 5만 원 손해예요. 어떻게 하실래요?" 이렇게요. 강요는 안 해요.
Q: 그 차이가 크네요. 권하는 거랑 속이는 거.
사장: 그게 전부예요. 권하는 건 영업이고, 숨기고 끼우는 건 사기예요. 경계가 거기예요.

**[5:20–6:50 마진 공개하면 손해 아니냐]**
Q: 근데 이렇게 마진을 다 까면, 손해 아니에요? 손님이 "그것밖에 안 남으면 더 깎아줘" 할 수도 있잖아요.
사장: (웃음) 그런 분 있어요. 근데 단기로만 손해예요. 길게 보면 정반대예요.
Q: 왜요?
사장: 생각해보세요. '저 집은 마진까지 다 보여주네? 숨기는 게 없네?' 이 평판이 한번 생기면요, 그게 제일 싼 광고예요. 돈 주고도 못 사는 신뢰예요. 손님이 손님을 데려와요. 지금 이 영상도 사실 광고잖아요. 근데 출연료가 뭐냐면, 제 마진을 까는 거예요. (웃음) 좀 아프긴 한데, 이게 제일 효과 좋은 광고라고 봐요.
Q: 마진 공개가 광고다.
사장: 네. 투명한 게 무기인 시대예요. 다들 숨기니까, 안 숨기는 게 오히려 튀는 거예요.

**[6:50–8:20 손님이 기억할 것]**
Q: 자, 그럼 이 영상 보는 손님이 딱 기억할 거 하나만요.
사장: 매장은 자선사업이 아니에요. 남기는 게 정상이에요. 안 남기면 망하고, 망하면 AS도 못 받아요. 그러니까 '안 남기는 매장'을 찾지 마세요. 그런 덴 없어요. 대신 **얼마를, 어떻게 남기는지 투명한 매장**을 찾으세요.
Q: 투명한 매장을 어떻게 알아봐요?
사장: 두 개만 보면 돼요. 하나, 조건을 종이로 적어주는가. 둘, 빼달라면 빼주는가. 이 두 개만 통과하면 믿을 만한 데예요. 마진 많이 남기든 적게 남기든, 적어도 손님을 속이진 않는 거니까.

**[8:20–10:00 마무리]**
Q: 사장님은 그럼 마진 적게 남기는 게 안 불안하세요? 솔직히.
사장: 불안하죠. 사람인데. 근데 저는 이렇게 생각해요. 폰은 2년에 한 번 바꾸잖아요. 한 분이 저한테 한 번 잘 사면, 2년 뒤에 또 와요. 그 사이에 가족도 데려와요. 그러니까 한 분이 평생 가져다주는 돈은 한 번 판 그 마진이 아니에요. 10년이면 폰 다섯 번, 가족까지 합치면 스무 번이에요. 그걸 보면 첫 거래에서 욕심부릴 이유가 없어요.
Q: 그게 결국 남는 장사다.
사장: 네. 한 번에 크게 남기고 안 보일 거냐, 작게 남기고 평생 볼 거냐. 저는 평생 보는 쪽으로 정했어요. 그래서 마진도 깔 수 있는 거고요.
[종료 자막: 조건은 전부 서면으로 — 폰키호테 방학점]

## 대본 B-3. 「어떤 손님은 그냥 돌려보내요?」 (본편 ~10분 + 숏츠 2개)

**[0:00–0:15 콜드오픈]** ※숏츠 컷 ①
Q: 사장님, 손님을 안 받고 그냥 돌려보낸 적 있어요?
사장: 있죠. 지난주에도요.
Q: 폰 가게가… 손님을 돌려보낸다고요? 매출인데?
사장: 안 파는 게 맞는 경우가 있어요. 생각보다 자주요.

**[0:15–2:00 케이스 1 — 지금 사면 손해인 손님]**
사장: 지난주에 어머님 한 분이 오셨어요. 폰 바꾸시겠다고. 근데 제가 쓰시던 폰을 보니까, 약정이 두 달밖에 안 남았더라고요.
Q: 두 달이면… 거의 끝난 거 아니에요?
사장: 네. 근데 지금 바꾸면 그 두 달 치 위약금이 나와요. 아까 폰글리시에서 말한 그 할인반환금. 그게 새로 받는 할인보다 더 커요. 그러니까 지금 바꾸면 손해인 거예요. 그래서 제가 그랬어요. "어머님, 두 달만 더 쓰시고 오세요. 지금 바꾸면 손해예요." 달력에 날짜까지 적어드렸어요.
Q: 아니, 그냥 팔면 그게 매출이잖아요. 어머님은 모르셨을 거고.
사장: 모르셨죠. 그냥 팔 수 있었어요. 근데 생각해보세요. 그 매출 한 번 잡고 어머님이 나중에 "아 거기서 위약금 물고 샀네" 알게 되면, 영영 안 오세요. 그 한 번이랑, 두 달 뒤에 오셔서 10년 단골 되시는 거랑 — 어느 게 남는 거예요? ★계산이 안 되나요?★ (웃음)

**[2:00–3:40 케이스 2 — 바꿀 필요가 없는 손님]** ※숏츠 컷 ②
Q: 또 다른 케이스도 있어요?
사장: 있어요. 폰이 멀쩡한데 바꾸려는 분들. 이게 은근히 많아요.
Q: 멀쩡한데 왜 바꾸려고 하세요?
사장: 매장 분위기에 휩쓸리는 거예요. 새 폰 보면 갖고 싶잖아요. 근데 들어보면 지금 폰 산 지 2년도 안 됐고, 느려진 것도 아니고, 그냥 배터리만 좀 빨리 닳는 거예요. 그런 분들한텐 제가 그래요. ★"어머님, 이 폰 아직 안 죽었어요. 배터리만 가세요. 3만 원이면 2년 더 써요."★
Q: 그럼 매장은 배터리 교체비 3만 원만 버는 거네요.
사장: 그렇죠. 100만 원짜리 팔 걸 3만 원 받는 거예요. 근데 그 어머님이 그 얘기를 어디 가서 하겠어요. "거기 사장이 폰 사지 말라더라, 배터리만 갈라더라." 이 말이 백만 원짜리 광고예요.
Q: 그러니까 안 파는 게 광고다.
사장: 네. 그리고 이런 분들도 많아요. 매장 들어가면 강매당할까 봐 무서워서 못 들어오겠다는 분들. 그 마음 알아요. 그래서 저희는 들어와서 구경만 하다 가셔도 돼요. 진짜로요. 안 사고 나가는 손님한테 인상 쓰는 직원, 저희 집엔 없습니다. 그건 제가 교육을 그렇게 시켜요.

**[3:40–5:20 케이스 3 — 과한 걸 원하는 손님]**
Q: 돌려보내는 세 번째 경우도 있나요?
사장: 있어요. 이건 좀 다른 경운데. 필요 이상으로 비싼 걸 원하시는 분.
Q: 그건 비싸게 팔면 매장은 더 좋은 거 아니에요?
사장: 좋죠. 근데 예를 들어, 어르신이 오셔서 "제일 좋은 거 주세요" 하세요. 카톡이랑 전화만 쓰시는데 200만 원짜리 최신 플래그십을 달라고 하시는 거예요. 그럼 제가 말려요. "어머님, 이거 기능 90%는 평생 안 쓰세요. 이 중간 거면 충분해요. 80만 원 아끼세요." 하고요.
Q: 120만 원 손해 보시는 건데.
사장: 당장은요. 근데 그 어머님이 집에 가서 아들한테 그래요. "글쎄 그 집 사장이 비싼 거 사지 말라고 말리더라." 그럼 그 아들이 와요. 누나도 오고. 그게 남는 거예요. 한 분을 제대로 모시면 가족이 다 와요.

**[5:20–7:00 왜 이렇게 장사하나]**
Q: 솔직히 이렇게 장사하면 답답하지 않으세요? 눈앞의 매출을 자꾸 놓치는 건데.
사장: 처음엔 답답했어요. 옆에서 막 팔 때 저는 손님 돌려보내고 있으니까. 근데 6개월쯤 지나니까 달라지더라고요.
Q: 어떻게요?
사장: 돌려보낸 손님들이 돌아와요. 두 달 뒤에 오시라던 어머님, 진짜 두 달 뒤에 오세요. 그것도 친구 데리고. 배터리만 갈라던 손님, 2년 뒤에 진짜 바꿀 때 저한테 와요. "그때 솔직하게 말해줘서 이번엔 여기서 산다" 하고요. 그러니까 돌려보낸 게 손해가 아니라 적금이었던 거예요. 6개월 뒤부터 이자가 붙더라고요.

**[7:00–8:30 손님이 해야 할 일]**
Q: 그럼 손님 입장에서, 어떤 손님이 오면 사장님이 제일 잘 도와드릴 수 있어요?
사장: 솔직한 손님이요. "나 폰 잘 몰라요. 근데 호갱은 되기 싫어요." 이 한마디면 돼요.
Q: 모른다고 하면 더 당하는 거 아니에요? 보통은?
사장: 다른 데선 그럴 수 있어요. 근데 그건 매장이 나쁜 거지 손님이 잘못한 게 아니에요. 모르는 건 죄가 아니에요. 모르셔도 돼요. 아는 건 저희가 하면 되니까. 손님은 비교만 하시면 돼요. 두 군데서 할부원금 물어보고, 싼 데서 사면 끝이에요. 그 정도는 누구나 할 수 있잖아요.

**[8:30–10:00 마무리 + CTA]**
Q: 마지막으로 한마디 부탁드려요.
사장: 폰 바꿀까 말까 고민되는 분들 많죠. 지금 바꿔도 되나, 손해 아닌가. 그럴 땐 그냥 폰 들고 저한테 오세요. 사라는 말이 아니에요. ★"지금 바꾸지 마세요. 손해예요." 이 답을 드릴 수도 있는 매장이거든요.★ 안 사도 돼요. 진짜로. 그냥 지금 내 상황이 바꿀 때인지 아닌지만 봐드릴게요. 그것만 알아가도 충분해요. 호갱 안 되는 첫걸음은, 지금이 바꿀 타이밍인지 아는 거예요. 그것부터 같이 봅시다.
[종료 자막: 안 사도 됩니다. 비교하러 오세요 — 폰키호테 방학점]

# PART 4. 촬영·운영 체크리스트

1. **숫자 교체**: 모든 출고가/지원금/요금제 숫자는 촬영 주간 실제 조건으로 교체. 보드에 "※ 예시/촬영일 기준" 문구를 작게 명기(분쟁 방지).
2. **표현 가이드**: "불법", "내려치기", "좌표" 등 단속 연상 단어는 본편에서 사용하지 않음. "지원금", "조건", "실구매가"로 통일. 견적서 제보 콘텐츠는 매장명·개인정보 모자이크 필수.
3. **★문장 우선 암기**: 인터뷰 대본의 ★표 문장만 그대로, 나머지는 사장님 말투로 재구성. 리허설은 질문 순서만 공유하고 답은 즉흥에 가깝게 — 정적과 웃음이 진정성 소스.
4. **숏츠 컷 규칙**: 콜드오픈 10~15초 + 핵심답변 1개 + "풀영상은 채널에" 자막. 본편 1편당 숏츠 2~3개 확보.
5. **10분 페이싱**: 강의형은 타임코드 구간마다 보드 판서가 한 칸씩 채워지게(시각 변화 = 이탈 방지). 인터뷰형은 8~10분 구간에 '개인 서사/속마음'을 넣어 후반 이탈을 잡음.
6. **화이트보드 단독컷 활용**: PART 1의 단독컷 이미지는 인트로/챕터 전환/섬네일 배경으로 사용. 한글 글자가 AI에서 깨지면, 보드는 빈/흐린 상태로 생성하고 글자는 편집툴에서 얹기.
7. **업로드 순서 제안**: B-1(사기 질문) → A-1(견적서 해부) → B-2(마진 공개) → A-2(용어 사전) → B-3(돌려보내는 손님) → A-3(자급제 대결). 호기심→전문성→솔직함 순환.
